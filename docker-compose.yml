version: "3.9"

services:
  docagent:
    build: .
    container_name: private-doc-agent
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VECTOR_STORE_PATH=/app/data/vectorstore
      - DOCUMENTS_PATH=/app/data/documents
      - CHUNK_SIZE=3200
      - CHUNK_OVERLAP=400
      - TOP_K_RESULTS=5
    volumes:
      # Mount your local data folder so documents and index persist
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# Usage:
#   cp .env.example .env && edit .env
#   docker compose up --build
#   Open http://localhost:8000 in browser
#   Mobile: http://YOUR_IP:8000
